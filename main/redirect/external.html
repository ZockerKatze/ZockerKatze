<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
            max-width: 500px;
        }
        h1 {
            color: #333;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .countdown {
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 10px;
            color: #d9534f;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 15px;
            font-size: 1em;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .lang-switch {
            display: inline-block;
            border: none;
            cursor: pointer;
            padding: 10px 10px;
            justify-content: center;
        }

        .btn:hover {
            background-color: #218838;
        }

        hr {
            width: 50%;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let countdown = 20;
            const timerElement = document.getElementById("timer");

            const interval = setInterval(() => {
                    timerElement.textContent = countdown;
                    if (countdown === 0) {
                        clearInterval(interval);
                        window.location.href = "https://australia-findings.gl.at.ply.gg:43678";
                    }
                    countdown--;
                },
                1000);
        });
    </script>
</head>
<body>

<div class="container">
    <h1>Redirecting...</h1>
    <hr>
    <p>You are about to be redirected to an external server , The Source to which is Open, No Cookies or any User-Data is collected</p>
    <p>You have <span class="countdown" id="timer">20</span> seconds before the redirect.</p>

    <hr>

    <!-- Buttons -->

    <a class="btn" href="http://australia-findings.gl.at.ply.gg:43678">Go to Website</a>
    <div class="lang-switch">
        <a href="external-de.html" class="btn">Deutsch</a>
    </div>


</div>
</body>
</html>
