<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTP - LOGIN</title>
  <link rel="stylesheet" href="secretstyle.css">
  <script>
    async function checkPassword() {
      const input = document.getElementById("password").value;
      const encoder = new TextEncoder();
      const data = encoder.encode(input);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      const correctHash = "a5a031a58ca1210a49e242f8d4211e4e3c2cf925d91dd58ef81d36361d69278d";

      if (hashHex === correctHash) {
        window.location.href = "../msw/index.html";
      } else {
        document.getElementById("error-message").textContent = "Falsches Passwort";
      }
    }

    function togglePassword() {
      const passwordField = document.getElementById("password");
      const toggleIcon = document.getElementById("togglePassword");

      if (passwordField.type === "password") {
        passwordField.type = "text";
        toggleIcon.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        passwordField.type = "password";
        toggleIcon.classList.replace("fa-eye-slash", "fa-eye");
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("password").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
          checkPassword();
        }
      });
    });
  </script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="login-container">
  <h2>Passwort:</h2>
  <div class="input-group">
    <input class="passbox" type="password" id="password" placeholder="Passwort eingeben">
    <span class="toggle-password" onclick="togglePassword()">
      <i id="togglePassword" class="fa fa-eye"></i>
    </span>
  </div>
  <p id="error-message"></p>
  <div class="button-group">
    <button onclick="checkPassword()">Ok!</button>
    <a href="secret.html"><button>🏴󠁧󠁢󠁥󠁮󠁧󠁿 Englisch</button></a>
  </div>
</div>
</body>
</html>
